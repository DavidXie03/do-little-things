<svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="card-grad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#8B83FF"/>
    </linearGradient>
  </defs>
  <!-- 底部卡片（向右倾斜 6°） -->
  <rect x="16" y="12" width="36" height="44" rx="6" fill="#6C63FF" opacity="0.35" transform="rotate(6 34 34)"/>
  <!-- 顶部卡片（向左倾斜 6°） -->
  <rect x="4" y="4" width="36" height="44" rx="6" fill="url(#card-grad)" transform="rotate(-6 22 26)"/>
  <!-- 白色对勾 -->
  <polyline points="14,28 20,34 30,22" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-6 22 26)"/>
</svg>
